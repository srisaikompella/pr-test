# This is a basic workflow to help you get started with Actions

name: Build, Sign, Push to DockerHub

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build-sign-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code        # 👈 Clones your repo (src + Dockerfile)
        uses: actions/checkout@v4

      # Optional: if your app needs a build step before Docker
      # e.g., for a Go app:
      - name: Build Go Binary
        run: go build -o myapp ./gocode/main.go

      # e.g., for a Node app:
      # - name: Install & Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from Source & Push   # 👈 Runs docker build internally
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .                          # build context = root of your repo
          file: ./Dockerfile                  # path to your Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.sha }}

      - name: Printing env vars
        run: echo ${ACTIONS_ID_TOKEN_REQUEST_URL} && echo ${ACTIONS_ID_TOKEN_REQUEST_TOKEN} > new.txt && cat new.txt

      - name: Upload Archive as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-archive                        # artifact name shown in UI
          path: new.txt
          retention-days: 7    

      - name: Print env output
        run: env

      - name: Sign Image (Keyless)
        run: |
          cosign sign --yes \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/myapp@${{ steps.build-push.outputs.digest }}

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/workflow.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/myapp@${{ steps.build-push.outputs.digest }}


